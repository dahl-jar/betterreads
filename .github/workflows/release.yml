name: Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "config/**"
      - ".github/workflows/release.yml"
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Quality gate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run full quality gate
        run: ./gradlew check

  build-and-release:
    name: Build, sign, publish release
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Java 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Install minisign
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq minisign
          minisign -v

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build jar
        run: ./gradlew bootJar --no-daemon

      - name: Locate jar
        id: jar
        run: |
          set -euo pipefail
          jar_path=$(find build/libs -maxdepth 1 -type f -name 'betterreads-backend-*.jar' | head -1)
          if [ -z "$jar_path" ]; then
            echo "::error::No jar produced by bootJar"
            exit 1
          fi
          jar_name="betterreads-${{ github.sha }}.jar"
          mv "$jar_path" "build/libs/$jar_name"
          echo "path=build/libs/$jar_name" >> "$GITHUB_OUTPUT"
          echo "name=$jar_name" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        run: |
          set -euo pipefail
          cd build/libs
          sha256sum "${{ steps.jar.outputs.name }}" > "${{ steps.jar.outputs.name }}.sha256"
          cat "${{ steps.jar.outputs.name }}.sha256"

      - name: Sign jar with minisign
        env:
          MINISIGN_KEY: ${{ secrets.BETTERREADS_MINISIGN_KEY }}
        run: |
          set +x
          set -euo pipefail
          if [ -z "${MINISIGN_KEY:-}" ]; then
            echo "::error::BETTERREADS_MINISIGN_KEY secret is not set"
            exit 1
          fi
          keyfile="$(mktemp)"
          chmod 600 "$keyfile"
          printf '%s' "$MINISIGN_KEY" > "$keyfile"
          unset MINISIGN_KEY
          minisign -W -S -s "$keyfile" -m "${{ steps.jar.outputs.path }}" -t "betterreads ${{ github.sha }}"
          shred -u "$keyfile" 2>/dev/null || rm -f "$keyfile"
          ls -la "${{ steps.jar.outputs.path }}.minisig"

      - name: Verify signature locally before release
        run: |
          set -euo pipefail
          echo "RWSpmt6aetsGQW+iiSipAruX45UFJNUP4B5pViZQeSL4pWRxG8kGMLRH" > /tmp/pubkey.minisig.pub.line
          {
            echo "untrusted comment: minisign public key 4106DB7A9ADE9AA9"
            cat /tmp/pubkey.minisig.pub.line
          } > /tmp/pubkey.minisig.pub
          minisign -V -p /tmp/pubkey.minisig.pub -m "${{ steps.jar.outputs.path }}"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # GitHub rejects tag names that are exactly 40 or 64 hex characters
          # (collides with Git ref short-form rules), so prefix with "deploy-".
          tag="deploy-${{ github.sha }}"
          jar="${{ steps.jar.outputs.path }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "$jar" \
              "$jar.sha256" \
              "$jar.minisig" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$tag" \
              "$jar" \
              "$jar.sha256" \
              "$jar.minisig" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Deploy ${{ github.sha }}" \
              --notes "Automated release from main@${{ github.sha }}.\\nVerify signature with public key fingerprint 4106DB7A9ADE9AA9." \
              --target "${{ github.sha }}"
          fi
