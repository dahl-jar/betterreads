spring:
  application:
    name: betterreads

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:betterreads}
    username: ${DB_USERNAME:betterreads}
    password: ${DB_PASSWORD:betterreads}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:betterreads}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

auth:
  rate-limit:
    login-capacity: 10
    login-refill-tokens: 1
    login-refill-seconds: 6
    register-capacity: 5
    register-refill-tokens: 1
    register-refill-seconds: 60
    max-buckets: 10000
    trusted-proxies: ${AUTH_TRUSTED_PROXIES:}

openlibrary:
  base-url: https://openlibrary.org
  search-limit: 20
  connect-timeout: 5000
  read-timeout: 10000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false

logging:
  level:
    com.betterreads: INFO
    org.springframework.security: WARN
