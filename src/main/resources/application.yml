spring:
  application:
    name: betterreads

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:betterreads}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_APP_USERNAME:betterreads_app}
    password: ${DB_APP_PASSWORD:betterreads_app}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:betterreads}?sslmode=${DB_SSL_MODE:disable}
    user: ${DB_USERNAME:betterreads}
    password: ${DB_PASSWORD:betterreads}
    target: ${SPRING_FLYWAY_TARGET:latest}
    placeholders:
      appPassword: ${DB_APP_PASSWORD:betterreads_app}

server:
  port: 8080
  forward-headers-strategy: framework

management:
  server:
    port: 8081
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: betterreads
    distribution:
      percentiles-histogram:
        http.server.requests: true

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:betterreads}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:30}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}

cloudflare:
  access:
    aud: ${CLOUDFLARE_ACCESS_AUD:}
    team-domain: ${CLOUDFLARE_TEAM_DOMAIN:}

mail:
  provider: ${MAIL_PROVIDER:logging}
  api-key: ${RESEND_API_KEY:}
  from: ${MAIL_FROM:}
  app-base-url: ${APP_BASE_URL:}
  outbox:
    worker-enabled: ${MAIL_OUTBOX_WORKER_ENABLED:true}
    claim-batch-size: 10
    max-attempts: 3
    lease-seconds: 300

auth:
  refresh-cookie:
    secure: ${AUTH_REFRESH_COOKIE_SECURE:true}
  rate-limit:
    login-capacity: 10
    login-refill-tokens: 1
    login-refill-seconds: 6
    register-capacity: 5
    register-refill-tokens: 1
    register-refill-seconds: 60
    forgot-password-capacity: 3
    forgot-password-refill-tokens: 1
    forgot-password-refill-seconds: 300
    reset-password-capacity: 5
    reset-password-refill-tokens: 1
    reset-password-refill-seconds: 60
    verify-email-capacity: 5
    verify-email-refill-tokens: 1
    verify-email-refill-seconds: 60
    resend-verification-capacity: 3
    resend-verification-refill-tokens: 1
    resend-verification-refill-seconds: 300
    max-buckets: 10000
    trusted-proxies: ${AUTH_TRUSTED_PROXIES:}

betterreads:
  auth:
    deletion:
      grace-period-hours: ${AUTH_DELETION_GRACE_PERIOD_HOURS:720}
      scheduler-enabled: ${AUTH_DELETION_SCHEDULER_ENABLED:true}

openlibrary:
  base-url: https://openlibrary.org
  search-limit: 20
  connect-timeout: 5000
  read-timeout: 10000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  public-url: ${SPRINGDOC_PUBLIC_URL:http://localhost:8080}

logging:
  level:
    com.betterreads: INFO
    org.springframework.security: WARN
    org.springdoc: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-}] %logger{36} - %msg%n"
