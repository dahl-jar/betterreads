name: betterreads-e2e

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: betterreads
      POSTGRES_USER: betterreads
      POSTGRES_PASSWORD: betterreads
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betterreads -d betterreads"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minio-root
      MINIO_ROOT_PASSWORD: minio-root-password
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      APP_ACCESS_KEY: betterreads-app
      APP_SECRET_KEY: betterreads-app-secret
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio-root minio-root-password &&
      mc mb --ignore-existing local/betterreads-images &&
      printf '%s' '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"s3:GetObject\",\"s3:PutObject\",\"s3:DeleteObject\"],\"Resource\":[\"arn:aws:s3:::betterreads-images/*\"]},{\"Effect\":\"Allow\",\"Action\":[\"s3:ListBucket\",\"s3:GetBucketLocation\"],\"Resource\":[\"arn:aws:s3:::betterreads-images\"]}]}' > /tmp/app-policy.json &&
      mc admin policy create local betterreads-app-rw /tmp/app-policy.json || true &&
      mc admin user add local $$APP_ACCESS_KEY $$APP_SECRET_KEY &&
      mc admin policy attach local betterreads-app-rw --user $$APP_ACCESS_KEY || true
      "

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: betterreads
      DB_USERNAME: betterreads
      DB_APP_USERNAME: betterreads
      DB_APP_PASSWORD: betterreads
      DB_PASSWORD: betterreads
      DB_SSL_MODE: disable
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: betterreads-images
      MINIO_ACCESS_KEY: betterreads-app
      MINIO_SECRET_KEY: betterreads-app-secret
      IMAGES_PUBLIC_BASE_URL: http://localhost:18080
      JWT_SECRET: e2e-jwt-secret-not-for-real-use-0123456789abcdef0123456789
      MAIL_PROVIDER: logging
    ports:
      - "127.0.0.1:18080:8080"
